<mat-form-field >
      <mat-chip
        *ngFor="let fruit of fruits"
     
      >
        {{fruit}}
        <mat-icon matChipRemove *ngIf="removable">cancel</mat-icon>
      </mat-chip>
      <input
        type="text"
        matInput
        placeholder="New fruit..."
        #fruitInput 
        [formControl]="fruitCtrl"
        [matAutocomplete]="auto" 
      >
    <mat-autocomplete #auto="matAutocomplete" (optionSelected)="selected($event)" >
      <mat-option *ngFor="let fruit of filteredFruits | async">
        <mat-checkbox color="primary" style="padding: 0 12px;" ></mat-checkbox>
        {{fruit}}
      </mat-option>
    </mat-autocomplete>
    <!-- <button mat-icon-button matSuffix style="width: 34px; height: 34px;" (click)="openAuto(autocompleteTrigger)"><mat-icon style="width: 34px;">expand_more</mat-icon></button> -->
  </mat-form-field>
